name: Build

on:
  push:
    branches:
      - '**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Build and Analysis
        run: mvn verify -DskipTests=true

  build:
    runs-on: ubuntu-latest
    needs: verify
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user" 
          --health-interval 10s 
          --health-timeout 5s 
          --health-retries 5

    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Run Flyway Migrations
        env:
          FLYWAY_URL: jdbc:postgresql://localhost:5432/serviceMaker
          FLYWAY_USER: postgres
          FLYWAY_PASSWORD: postgres
        run: mvn flyway:migrate

      - name: Run Tests
        run: mvn test

      - name: Package Application
        run: mvn package
